name: Deploy to Railway Volume

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway Volume
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "RAILWAY_TOKEN is not set" >&2
            exit 1
          fi

          railway ssh \
            --project 357d3bd3-d006-46ad-aa91-7ac88b3fb7c1 \
            --service Odoo \
            --environment production \
            -- /usr/local/bin/sync_addons_and_start.sh

      - name: Notify completion
        run: echo "✅ Deployment to Railway volume complete!"
