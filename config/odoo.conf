[options]
; Performance settings for Railway deployment

; Workers (set to 2-4 based on container resources)
; Formula: (CPU cores * 2) + 1, but limit for small containers
workers = 2

; Memory limits per worker (in bytes)
; Soft limit: 640MB, Hard limit: 768MB
limit_memory_soft = 671088640
limit_memory_hard = 805306368

; Time limits
limit_time_cpu = 600
limit_time_real = 1200
limit_time_real_cron = 300

; Proxy mode (required behind Railway's proxy)
proxy_mode = True

; Database settings
db_maxconn = 8

; Logging (reduce verbosity for performance)
log_level = warn
log_handler = :WARNING

; Asset optimization
; Let nginx/CDN handle static files if possible
