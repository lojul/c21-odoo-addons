[options]
; Performance settings for Railway deployment
; Using threaded mode (simpler than multiprocess workers)

; Custom addons path (includes persistent volume and image addons)
addons_path = /var/lib/odoo/addons/19.0,/mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons

; Disable multiprocess workers - use threaded mode instead
workers = 0

; Increase database connection pool (important!)
db_maxconn = 64

; Proxy mode (required behind Railway's proxy)
proxy_mode = True

; Time limits
limit_time_cpu = 600
limit_time_real = 1200

; Reduce logging for performance
log_level = warn

; Enable list_db for debugging (can disable later)
list_db = True
